<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학교 자율학습 출석부</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .header-banner {
      text-align: center;
      margin-bottom: 20px;
      background: #fff;
      padding: 10px 0;
    }
    .header-banner img {
      max-width: 100%;
      height: auto;
      display: inline-block;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
    }
    h2.section-title {
      font-size: 1.05rem;
      color: #333;
      margin: 24px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #e5e5e5;
    }
    form div {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: bold;
      margin-bottom: 5px;
    }
    input[type="text"],
    select,
    button {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    button {
      background: #007BFF;
      color: #fff;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #0056b3;
    }
    .other-input {
      display: none;
      margin-top: 5px;
      padding: 8px;
      border: 1px solid #aaa;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .exam-toggle-box {
      background: #f8fbff;
      border: 1px solid #d9e9ff;
      border-radius: 8px;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .exam-toggle-box label {
      font-weight: normal;
      margin-bottom: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .exam-section {
      display: none;
      margin-top: 10px;
      padding: 14px;
      border: 1px solid #d9e9ff;
      border-radius: 8px;
      background: #fcfdff;
    }
    .exam-note {
      font-size: 0.9rem;
      color: #555;
      margin-top: -5px;
      margin-bottom: 10px;
    }
    @media (max-width: 600px) {
      .container {
        max-width: 95%;
        margin: 10px auto;
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="header-banner">
    <img src="https://topelite.co.kr/data/file/gallery/thumb-2e633af12c46843b976cdf498241790c_6Yr7OmqI_b3272527febfc64d7a0debbc5fef220f8fdf6c6c_835x835.jpg" alt="배너 이미지">
  </div>

  <div class="container">
    <h1>학교 자율학습 출석부</h1>

    <form id="attendanceForm">
      <div>
        <label for="studentId">학번 (예: 1234)</label>
        <input type="text" id="studentId" name="studentId" pattern="^\d{4}$" maxlength="4" required>
      </div>

      <div>
        <label for="name">이름</label>
        <input type="text" id="name" name="name" required>
      </div>

      <h2 class="section-title">시험기간 전용</h2>

      <div class="exam-toggle-box">
        <label for="enableExamStudy">
          <input type="checkbox" id="enableExamStudy">
          시험기간 추가자습(15:00~16:40)도 함께 입력하기
        </label>
      </div>

      <div id="examStudySection" class="exam-section">
        <div class="exam-note">시험기간이 아닐 때는 체크하지 않아도 됩니다.</div>

        <div>
          <label for="examStudy">시험기간 추가자습 장소 (15:00~16:40)</label>
          <select id="examStudy" name="examStudy">
            <option value="">선택하세요</option>
            <option value="교실">교실</option>
            <option value="강의실 4">강의실 4</option>
            <option value="아고라(교무실 옆)">아고라(교무실 옆)</option>
            <option value="아고라(3~4반 사이)">아고라(3~4반 사이)</option>
            <option value="아고라(강의실 1옆)">아고라(강의실 1옆)</option>
            <option value="시청각실">시청각실</option>
            <option value="지성의 계단">지성의 계단</option>
            <option value="한우리관(강당)">한우리관(강당)</option>
            <option value="과학실">과학실</option>
            <option value="무한상상실">무한상상실</option>
            <option value="외출">외출</option>
            <option value="외박">외박</option>
            <option value="기타">기타</option>
          </select>
          <input type="text" id="otherExamStudy" name="otherExamStudy" class="other-input" placeholder="예: 교무실(상담)">
        </div>
      </div>

      <h2 class="section-title">기본 자율학습</h2>

      <div>
        <label for="period8">8교시 자습 장소</label>
        <select id="period8" name="period8" required>
          <option value="">선택하세요</option>
          <option value="교실">교실</option>
          <option value="강의실 4">강의실 4</option>
          <option value="아고라(교무실 옆)">아고라(교무실 옆)</option>
          <option value="아고라(3~4반 사이)">아고라(3~4반 사이)</option>
          <option value="아고라(강의실 1옆)">아고라(강의실 1옆)</option>
          <option value="시청각실">시청각실</option>
          <option value="지성의 계단">지성의 계단</option>
          <option value="한우리관(강당)">한우리관(강당)</option>
          <option value="과학실">과학실</option>
          <option value="무한상상실">무한상상실</option>
          <option value="외출">외출</option>
          <option value="외박">외박</option>
          <option value="기타">기타</option>
        </select>
        <input type="text" id="otherPeriod8" name="otherPeriod8" class="other-input" placeholder="예: 교무실(상담)">
      </div>

      <div>
        <label for="period9">9교시 자습 장소</label>
        <select id="period9" name="period9" required>
          <option value="">선택하세요</option>
          <option value="교실">교실</option>
          <option value="강의실 4">강의실 4</option>
          <option value="아고라(교무실 옆)">아고라(교무실 옆)</option>
          <option value="아고라(3~4반 사이)">아고라(3~4반 사이)</option>
          <option value="아고라(강의실 1옆)">아고라(강의실 1옆)</option>
          <option value="시청각실">시청각실</option>
          <option value="지성의 계단">지성의 계단</option>
          <option value="한우리관(강당)">한우리관(강당)</option>
          <option value="과학실">과학실</option>
          <option value="무한상상실">무한상상실</option>
          <option value="외출">외출</option>
          <option value="외박">외박</option>
          <option value="기타">기타</option>
        </select>
        <input type="text" id="otherPeriod9" name="otherPeriod9" class="other-input" placeholder="예: 교무실(상담)">
      </div>

      <div>
        <label for="period10">10교시 자습 장소</label>
        <select id="period10" name="period10" required>
          <option value="">선택하세요</option>
          <option value="교실">교실</option>
          <option value="강의실 4">강의실 4</option>
          <option value="아고라(교무실 옆)">아고라(교무실 옆)</option>
          <option value="아고라(3~4반 사이)">아고라(3~4반 사이)</option>
          <option value="아고라(강의실 1옆)">아고라(강의실 1옆)</option>
          <option value="시청각실">시청각실</option>
          <option value="지성의 계단">지성의 계단</option>
          <option value="한우리관(강당)">한우리관(강당)</option>
          <option value="과학실">과학실</option>
          <option value="무한상상실">무한상상실</option>
          <option value="외출">외출</option>
          <option value="외박">외박</option>
          <option value="기타">기타</option>
        </select>
        <input type="text" id="otherPeriod10" name="otherPeriod10" class="other-input" placeholder="예: 교무실(상담)">
      </div>

      <div>
        <label for="period11">11교시 자습 장소</label>
        <select id="period11" name="period11" required>
          <option value="">선택하세요</option>
          <option value="교실">교실</option>
          <option value="강의실 4">강의실 4</option>
          <option value="아고라(교무실 옆)">아고라(교무실 옆)</option>
          <option value="아고라(3~4반 사이)">아고라(3~4반 사이)</option>
          <option value="아고라(강의실 1옆)">아고라(강의실 1옆)</option>
          <option value="시청각실">시청각실</option>
          <option value="지성의 계단">지성의 계단</option>
          <option value="과학실">과학실</option>
          <option value="한우리관(강당)">한우리관(강당)</option>
          <option value="무한상상실">무한상상실</option>
          <option value="외출">외출</option>
          <option value="외박">외박</option>
          <option value="기타">기타</option>
        </select>
        <input type="text" id="otherPeriod11" name="otherPeriod11" class="other-input" placeholder="예: 교무실(상담)">
      </div>

      <button type="submit">제출</button>
    </form>
  </div>

  <script>
    function toggleOtherInput(selectId, otherInputId) {
      const selectElem = document.getElementById(selectId);
      const otherInputElem = document.getElementById(otherInputId);

      if (selectElem.value === "기타") {
        otherInputElem.style.display = "block";
      } else {
        otherInputElem.style.display = "none";
        otherInputElem.value = "";
      }
    }

    function toggleExamStudySection() {
      const enabled = document.getElementById("enableExamStudy").checked;
      const section = document.getElementById("examStudySection");
      const select = document.getElementById("examStudy");
      const other = document.getElementById("otherExamStudy");

      if (enabled) {
        section.style.display = "block";
      } else {
        section.style.display = "none";
        select.value = "";
        other.value = "";
        other.style.display = "none";
      }
    }

    document.getElementById("enableExamStudy").addEventListener("change", toggleExamStudySection);

    document.getElementById("examStudy").addEventListener("change", function() {
      toggleOtherInput("examStudy", "otherExamStudy");
    });
    document.getElementById("period8").addEventListener("change", function() {
      toggleOtherInput("period8", "otherPeriod8");
    });
    document.getElementById("period9").addEventListener("change", function() {
      toggleOtherInput("period9", "otherPeriod9");
    });
    document.getElementById("period10").addEventListener("change", function() {
      toggleOtherInput("period10", "otherPeriod10");
    });
    document.getElementById("period11").addEventListener("change", function() {
      toggleOtherInput("period11", "otherPeriod11");
    });

    document.getElementById("attendanceForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const enableExamStudy = document.getElementById("enableExamStudy").checked;
      const examStudySelect = document.getElementById("examStudy").value;
      const otherExamStudy = document.getElementById("otherExamStudy").value.trim();

      if (enableExamStudy && !examStudySelect) {
        alert("시험기간 추가자습 장소를 선택하세요.");
        return;
      }

      if (enableExamStudy && examStudySelect === "기타" && !otherExamStudy) {
        alert("시험기간 추가자습 기타 장소를 입력하세요.");
        return;
      }

      const data = {
        studentId: document.getElementById("studentId").value,
        name: document.getElementById("name").value,
        examStudy: enableExamStudy
          ? (examStudySelect === "기타" ? otherExamStudy : examStudySelect)
          : "",
        period8: document.getElementById("period8").value === "기타"
          ? document.getElementById("otherPeriod8").value
          : document.getElementById("period8").value,
        period9: document.getElementById("period9").value === "기타"
          ? document.getElementById("otherPeriod9").value
          : document.getElementById("period9").value,
        period10: document.getElementById("period10").value === "기타"
          ? document.getElementById("otherPeriod10").value
          : document.getElementById("period10").value,
        period11: document.getElementById("period11").value === "기타"
          ? document.getElementById("otherPeriod11").value
          : document.getElementById("period11").value
      };

      const scriptURL = "https://script.google.com/macros/s/AKfycbwqmE7Plmud5bDXgZ0g3VBM562wApFe5FrLY4qwLMOkrsQGV7PrE4VP8TO8FcSyOdX6UA/exec";

      fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
      })
      .then(() => {
        alert("제출되었습니다!");
        this.reset();
        document.getElementById("enableExamStudy").checked = false;
        toggleExamStudySection();
        document.getElementById("otherPeriod8").style.display = "none";
        document.getElementById("otherPeriod9").style.display = "none";
        document.getElementById("otherPeriod10").style.display = "none";
        document.getElementById("otherPeriod11").style.display = "none";
      })
      .catch(err => {
        console.error(err);
        alert("제출 중 오류가 발생했습니다.");
      });
    });

    toggleExamStudySection();
  </script>
</body>
</html>
